<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker</title>
    <!-- tailwind+ daisy  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- outfit fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet" />

    <!-- icons  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body>
    <nav class="flex flex-col md:flex-row md:justify-between md:items-center px-4 md:px-10 py-3 gap-3">
        <div class="flex items-center gap-1">
            <img src="assets/github-logo.png" class="w-7">
            <p class="font-bold">GitHub Issues Tracker</p>
        </div>

        <div class="flex items-center gap-1">
            <input type="text" placeholder="Search issues..." class="input input-bordered w-full max-w-sm" /> 
            <button class="btn btn-primary ml-2">
                <i class="fa-solid fa-plus mr-2"></i> New Issue
            </button>
        </div>
    </nav>

    <div class="bg-[#F8FAFC] min-h-screen flex items-center justify-center p-4">

    </div>
</body>

</html>
