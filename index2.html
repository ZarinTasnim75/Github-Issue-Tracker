<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker</title>
    <!-- tailwind+ daisy  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- outfit fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet" />

    <!-- icons  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body>
    <nav class="flex flex-col md:flex-row md:justify-between md:items-center px-4 md:px-10 py-3 gap-3">
        <div class="flex items-center gap-1">
            <img src="assets/github-logo.png" class="w-7">
            <p class="font-bold">GitHub Issues Tracker</p>
        </div>

        <div class="flex items-center gap-1">
            <input type="text" id="searchInput" placeholder="Search issues..." class="input input-bordered w-full max-w-sm" />
            <button class="btn btn-primary ml-2">
                <i class="fa-solid fa-plus mr-2"></i> New Issue
            </button>
        </div>
    </nav>

    <div class="bg-[#F8FAFC] min-h-screen p-4 sm:p-6 pt-8 sm:pt-10">

        <div class="bg-white p-4 rounded-lg shadow-sm mb-6 flex flex-wrap gap-3 
                w-full max-w-6xl mx-auto">
            <button id="allBtn" class="btn btn-primary btn-sm px-6 sm:px-8">All</button>
            <button id="openBtn" class="btn btn-outline border-gray-300 text-gray-500 btn-sm px-6 sm:px-8">Open</button>
            <button id="closedBtn"
                class="btn btn-outline border-gray-300 text-gray-500 btn-sm px-6 sm:px-8">Closed</button>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 w-full max-w-6xl mx-auto">

            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 p-5">

                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-purple-100 flex items-center justify-center rounded-full">
                        <img src="assets/Aperture.png" class="w-5 h-5">
                    </div>

                    <div>
                        <h2 class="font-semibold text-lg">
                           <p class="text-xl"> <span id="issueCount" class="text-xl">0</span> Issues</p>
                        </h2>
                        <p class="text-sm text-gray-500">
                            Track and manage your project issues
                        </p>
                    </div>
                </div>

                <div class="flex items-center gap-4 text-sm flex-wrap">
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 bg-green-500 rounded-full"></span>
                       <p> Open</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
                       <p> Closed</p>
                    </div>
                </div>

            </div>

            <div class="border-t border-gray-300"></div>

            <div id="issue_container" class="grid bg-[#FBFBFB] grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 p-6 w-full max-w-6xl mx-auto"></div>
        </div>
    </div>

<!--  -->
<div id="issueModal" class="fixed inset-0 bg-blue-500/10 backdrop-blur-sm hidden flex items-center justify-center z-50">
  <div
    class="bg-white rounded-2xl shadow-xl max-w-lg w-full p-8 relative flex flex-col gap-6"
    role="dialog" aria-modal="true" aria-labelledby="modalTitle"
  >

    <h2 id="modalTitle" class="text-2xl font-bold text-gray-900"></h2>

    <div class="flex items-center gap-3 text-sm text-gray-600">
      <span id="modalStatus" class="inline-block px-3 py-1 rounded-full text-white bg-green-500 font-semibold"></span>
      <span>•</span>
      <span id="modalAuthor"></span>
      <span>•</span>
      <span id="modalDate"></span>
    </div>


    <div id="modalLabels" class="flex flex-wrap gap-2 text-xs"></div>
    <p id="modalDescription" class="text-gray-600 text-sm leading-relaxed"></p>

    <div class="flex justify-between bg-gray-50 p-4 rounded-lg text-sm text-gray-800 font-semibold">
      <div>
       <p>Assignee:</p> <br />
        <span id="modalAssignee" class="font-normal"></span>
      </div>
      <div>
        <p>Priority:</p><br />
        <span id="modalPriority" class="inline-block px-3 py-1 rounded-full text-white font-semibold"></span>
      </div>
    </div>
    <button
      id="closeModal"
      class="self-end bg-indigo-600 hover:bg-indigo-700 text-white rounded-md px-6 py-2 font-semibold" >
     <p> Close</p>
    </button>
  </div>
</div>

    <script src="script/script.js"></script>
</body>

</html>
